<style>
.va-subjects {
  display: flex;
  flex-wrap: wrap;
  gap: 0.45rem;
  margin-bottom: 1.5rem;
  padding: 0.9rem 1rem;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.va-subj-btn {
  padding: 0.4rem 0.9rem;
  border-radius: 20px;
  border: 1.5px solid var(--line);
  background: var(--bg-soft);
  font-size: 0.78rem;
  color: var(--ink-soft);
  cursor: pointer;
  transition: all var(--transition);
  font-family: 'Inter', sans-serif;
  font-weight: 500;
}
.va-subj-btn:hover { background: var(--blush); color: var(--ink); border-color: var(--rose-soft); }
.va-subj-btn.active {
  background: linear-gradient(135deg, var(--rose) 0%, var(--rose-deep) 100%);
  color: white;
  border-color: transparent;
  box-shadow: var(--shadow-sm);
}
.va-search {
  width: 100%;
  padding: 0.7rem 1rem;
  border: 1.5px solid var(--line);
  border-radius: var(--radius);
  background: var(--paper);
  font-size: 0.88rem;
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  margin-bottom: 1.5rem;
  outline: none;
  transition: border-color var(--transition);
  box-sizing: border-box;
}
.va-search:focus { border-color: var(--rose); }
.va-player-wrap {
  display: none;
  margin-bottom: 1.5rem;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(44,36,32,.12);
}
.va-player-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.6rem 1rem;
  background: var(--ink);
  color: white;
}
.va-section {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  margin-bottom: 1rem;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.va-section-header {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  padding: 0.9rem 1.2rem;
  cursor: pointer;
  background: linear-gradient(135deg, var(--blush) 0%, var(--rose-soft) 100%);
  border-bottom: 1px solid var(--line);
  user-select: none;
  transition: filter var(--transition);
}
.va-section-header:hover { filter: brightness(0.97); }
.va-section-header .s-emoji { font-size: 1.3rem; }
.va-section-header .s-nome {
  font-family: 'Fraunces', serif;
  font-size: 1rem;
  font-weight: 500;
  flex: 1;
}
.va-section-header .s-count { font-size: 0.7rem; color: var(--ink-faded); letter-spacing: 0.1em; }
.va-section-header .s-toggle { font-size: 0.85rem; color: var(--ink-faded); transition: transform 0.25s; }
.va-section.collapsed .s-toggle { transform: rotate(-90deg); }
.va-section-body { display: block; }
.va-section.collapsed .va-section-body { display: none; }
.va-row {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  padding: 0.7rem 1.2rem;
  border-bottom: 1px dotted var(--line);
  cursor: pointer;
  transition: background var(--transition);
}
.va-row:last-child { border-bottom: none; }
.va-row:hover { background: var(--bg-soft); }
.va-row.active-row { background: var(--blush); }
.va-row.done-row { opacity: 0.5; }
.va-row .r-n {
  font-family: 'Fraunces', serif;
  font-size: 1rem;
  font-weight: 500;
  font-style: italic;
  color: var(--rose-deep);
  min-width: 2rem;
  text-align: center;
  flex-shrink: 0;
}
.va-row .r-titulo { flex: 1; font-size: 0.86rem; color: var(--ink); line-height: 1.4; }
.va-row .r-play {
  font-size: 0.7rem;
  color: var(--rose-deep);
  opacity: 0.5;
  flex-shrink: 0;
  transition: opacity var(--transition);
}
.va-row:hover .r-play { opacity: 1; }
.va-stats-bar {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.5rem 1.2rem;
  border-top: 1px solid var(--line);
  background: var(--bg-soft);
  font-size: 0.72rem;
  color: var(--ink-faded);
}
.va-prog-track { flex: 1; height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; }
.va-prog-fill { height: 100%; background: linear-gradient(90deg, var(--rose), var(--rose-deep)); border-radius: 2px; transition: width 0.4s; }

/* ── Responsivo (mobile) ─────────────────────── */
@media (max-width: 640px) {
  .va-subjects { padding: 0.7rem 0.8rem; gap: 0.35rem; }
  .va-subj-btn { padding: 0.32rem 0.7rem; font-size: 0.72rem; }
  .va-search { padding: 0.6rem 0.85rem; font-size: 0.82rem; }

  .va-section-header { padding: 0.75rem 0.9rem; gap: 0.6rem; }
  .va-section-header .s-nome { font-size: 0.9rem; }

  .va-row { padding: 0.6rem 0.9rem; gap: 0.5rem; }
  .va-row .r-titulo { font-size: 0.8rem; }
  .va-stats-bar { padding: 0.45rem 0.9rem; font-size: 0.66rem; }
}
</style>

<script>
const VA_META = {
  administrativo:  { label:'Administrativo',    emoji:'\u{1F3DB}' },
  civil:            { label:'Civil',             emoji:'⚖️' },
  constitucional:   { label:'Constitucional',    emoji:'\u{1F3DB}' },
  cdc:              { label:'Consumidor (CDC)',   emoji:'\u{1F6E1}' },
  eleitoral:        { label:'Eleitoral',         emoji:'\u{1F5F3}' },
  empresarial:      { label:'Empresarial',       emoji:'\u{1F4BC}' },
  eca:              { label:'ECA',               emoji:'\u{1F476}' },
  etica:            { label:'Ética',        emoji:'⚖️' },
  penal:            { label:'Penal',             emoji:'\u{1F512}' },
  previdenciario:   { label:'Previdenciário', emoji:'\u{1F3E5}' },
  proc_civil:       { label:'Proc. Civil',       emoji:'\u{1F4CB}' },
  proc_trabalho:    { label:'Proc. Trabalho',    emoji:'\u{1F527}' },
  proc_penal:       { label:'Proc. Penal',       emoji:'\u{1F50D}' },
  trabalho:         { label:'Trabalho',          emoji:'\u{1F477}' },
  tributario:       { label:'Tributário',   emoji:'\u{1F4B0}' }
};

let _ativoKey = 'all';


function vaAbrir(url, titulo, k, n) {
  document.getElementById('va-player-frame').src = url;
  document.getElementById('va-player-titulo').textContent = titulo;
  document.getElementById('va-player-wrap').style.display = 'block';
  document.getElementById('va-player-wrap').scrollIntoView({ behavior:'smooth', block:'start' });
  document.querySelectorAll('.va-row').forEach(r => r.classList.remove('active-row'));
  const row = document.getElementById('var-' + k + '-' + n);
  if (row) row.classList.add('active-row');
}

function vaFechar() {
  document.getElementById('va-player-frame').src = '';
  document.getElementById('va-player-wrap').style.display = 'none';
  document.querySelectorAll('.va-row').forEach(r => r.classList.remove('active-row'));
}


function vaFiltrar() {
  const q = (document.getElementById('va-search').value || '').toLowerCase().trim();
  document.querySelectorAll('.va-section').forEach(function(sec) {
    const k = sec.dataset.key;
    let vis = false;
    sec.querySelectorAll('.va-row').forEach(function(row) {
      const t = (row.querySelector('.r-titulo') || {}).textContent || '';
      const show = !q || t.toLowerCase().includes(q);
      row.style.display = show ? '' : 'none';
      if (show) vis = true;
    });
    const showSec = (_ativoKey === 'all' || _ativoKey === k) && (!q || vis);
    sec.style.display = showSec ? '' : 'none';
    if (q && vis && sec.classList.contains('collapsed')) sec.classList.remove('collapsed');
  });
}

function vaFiltrarMateria(k) {
  _ativoKey = k;
  document.querySelectorAll('.va-subj-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.key === k); });
  document.querySelectorAll('.va-section').forEach(function(sec) {
    sec.style.display = (k === 'all' || sec.dataset.key === k) ? '' : 'none';
  });
  if (k !== 'all') {
    var sec = document.querySelector('.va-section[data-key="' + k + '"]');
    if (sec) { sec.classList.remove('collapsed'); sec.scrollIntoView({ behavior:'smooth', block:'start' }); }
  }
}

function vaToggleSec(k) {
  var sec = document.querySelector('.va-section[data-key="' + k + '"]');
  if (sec) sec.classList.toggle('collapsed');
}

document.addEventListener('DOMContentLoaded', function() {
  if (typeof VIDEOAULAS === 'undefined') return;

  // Subject filter pills
  var subjectsEl = document.getElementById('va-subjects');
  var allBtn = document.createElement('button');
  allBtn.className = 'va-subj-btn active';
  allBtn.dataset.key = 'all';
  allBtn.textContent = 'Todas as matérias';
  allBtn.onclick = function() { vaFiltrarMateria('all'); };
  subjectsEl.appendChild(allBtn);

  Object.entries(VA_META).forEach(function([k, meta]) {
    var d = VIDEOAULAS[k];
    if (!d) return;
    var btn = document.createElement('button');
    btn.className = 'va-subj-btn';
    btn.dataset.key = k;
    btn.textContent = meta.emoji + ' ' + meta.label + ' (' + d.aulas.length + ')';
    btn.onclick = function() { vaFiltrarMateria(k); };
    subjectsEl.appendChild(btn);
  });

  // Build sections
  var lista = document.getElementById('va-lista');
  Object.entries(VA_META).forEach(function([k, meta]) {
    var d = VIDEOAULAS[k];
    if (!d || !d.aulas.length) return;
    var sec = document.createElement('div');
    sec.className = 'va-section';
    sec.dataset.key = k;

    var rows = d.aulas.map(function(a) {
      var safeTitle = a.titulo.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      var jsTitle = a.titulo.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return '<div class="va-row" id="var-' + k + '-' + a.n + '" onclick="vaAbrir(\'' + a.url + '\',\'' + jsTitle + '\',\'' + k + '\',' + a.n + ')">' +
        '<span class="r-n">' + a.n + '</span>' +
        '<span class="r-titulo">' + safeTitle + '</span>' +
        '<span class="r-play">▶</span>' +
        '</div>';
    }).join('');

    sec.innerHTML =
      '<div class="va-section-header" onclick="vaToggleSec(\'' + k + '\')">' +
        '<span class="s-emoji">' + meta.emoji + '</span>' +
        '<span class="s-nome">' + meta.label + '</span>' +
        '<span class="s-count">' + d.aulas.length + ' aulas</span>' +
        '<span class="s-toggle">▾</span>' +
      '</div>' +
      '<div class="va-section-body">' + rows + '</div>';

    lista.appendChild(sec);
  });

});
</script>
</body>
